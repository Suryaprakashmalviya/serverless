service: evolus-email-service

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  environment:
    NODE_ENV: local

  iam:
    role:
      statements:
        - Effect: 'Allow'
          Action:
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
            - 'logs:CreateLogGroup'
            - 'logs:CreateLogStream'
            - 'logs:PutLogEvents'
          Resource: "*"

functions:
  # SQS Consumer — triggered when WelcomeEmailQueue receives a message
  sendWelcomeEmail:
    handler: dist/lambda.sqsHandler
    events:
      - sqs:
          arn: arn:aws:sqs:us-east-1:000000000000:WelcomeEmailQueue
          batchSize: 1

plugins:
  - serverless-offline-sqs
  - serverless-offline

custom:
  # ── SQS Local ─────────────────────────────────────────────────────────────
  serverless-offline-sqs:
    autoCreate: true
    apiVersion: "2012-11-05"
    endpoint: http://localhost:9324
    region: us-east-1
    accountId: "000000000000"
    skipCacheInvalidation: false
